services:
  postgres:
    image: postgres:16-alpine
    container_name: sing-vivatech-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: sing
      POSTGRES_PASSWORD: sing_dev
      POSTGRES_DB: vivatech
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sing -d vivatech"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
