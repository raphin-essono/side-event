name: CI/CD — Side Event

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/side-event

jobs:
  # ── CI : lint + build de vérification ──────────────────────────
  build:
    name: Lint & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          # Valeur factice pour le build — la vraie URL est fournie à l'exécution
          DATABASE_URL: "file:./dev.db"
          SESSION_SECRET: "ci-build-only"

  # ── CD : image Docker poussée sur Docker Hub ───────────────────
  docker:
    name: Build & push Docker image
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Déploiement : pull + redémarrage sur le serveur via SSH ────
  deploy:
    name: Deploy to server
    needs: docker
    runs-on: ubuntu-latest
    env:
      DEPLOY_DIR: ~/side-event
    steps:
      - uses: actions/checkout@v4

      - name: Prepare compose file for server
        run: cp docker-compose.prod.yml docker-compose.yml

      - name: Copy docker-compose to server
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.IP_SERVER }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.PRIVATE_KEY }}
          passphrase: ${{ secrets.PASSPHRASE_PRIVATE_KEY }}
          port: ${{ secrets.PORT }}
          source: docker-compose.yml
          target: ${{ env.DEPLOY_DIR }}

      # Valide les secrets sur le runner (bash) avant SSH — message clair si un secret manque
      - name: Validate deploy secrets
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          HOST_EMAIL: ${{ secrets.HOST_EMAIL }}
          HOST_PASSWORD: ${{ secrets.HOST_PASSWORD }}
          IP_SERVER: ${{ secrets.IP_SERVER }}
          SSH_USER: ${{ secrets.USER }}
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          PORT: ${{ secrets.PORT }}
        run: |
          set -e
          missing=0
          for var in DOCKERHUB_USERNAME DOCKERHUB_TOKEN POSTGRES_PASSWORD SESSION_SECRET \
                     ADMIN_EMAIL ADMIN_PASSWORD HOST_EMAIL HOST_PASSWORD \
                     IP_SERVER SSH_USER PRIVATE_KEY PORT; do
            if [ -z "${!var}" ]; then
              echo "::error::GitHub secret $var is missing or empty"
              missing=1
            fi
          done
          [ "$missing" -eq 0 ] || exit 1

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          HOST_EMAIL: ${{ secrets.HOST_EMAIL }}
          HOST_PASSWORD: ${{ secrets.HOST_PASSWORD }}
        with:
          host: ${{ secrets.IP_SERVER }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.PRIVATE_KEY }}
          passphrase: ${{ secrets.PASSPHRASE_PRIVATE_KEY }}
          port: ${{ secrets.PORT }}
          envs: DOCKERHUB_USERNAME,DOCKERHUB_TOKEN,POSTGRES_PASSWORD,SESSION_SECRET,ADMIN_EMAIL,ADMIN_PASSWORD,HOST_EMAIL,HOST_PASSWORD
          script_stop: true
          script: |
            set -e
            mkdir -p ~/side-event

            # Vérifications directes (pas de ${!var} — incompatible avec /bin/sh distant)
            test -n "$DOCKERHUB_USERNAME" || { echo "ERROR: DOCKERHUB_USERNAME not forwarded"; exit 1; }
            test -n "$DOCKERHUB_TOKEN"      || { echo "ERROR: DOCKERHUB_TOKEN not forwarded"; exit 1; }
            test -n "$POSTGRES_PASSWORD"    || { echo "ERROR: POSTGRES_PASSWORD not forwarded"; exit 1; }
            test -n "$SESSION_SECRET"       || { echo "ERROR: SESSION_SECRET not forwarded"; exit 1; }
            test -n "$ADMIN_EMAIL"          || { echo "ERROR: ADMIN_EMAIL not forwarded"; exit 1; }
            test -n "$ADMIN_PASSWORD"       || { echo "ERROR: ADMIN_PASSWORD not forwarded"; exit 1; }
            test -n "$HOST_EMAIL"           || { echo "ERROR: HOST_EMAIL not forwarded"; exit 1; }
            test -n "$HOST_PASSWORD"        || { echo "ERROR: HOST_PASSWORD not forwarded"; exit 1; }

            umask 077
            printf '%s\n' \
              "DOCKERHUB_USERNAME=${DOCKERHUB_USERNAME}" \
              "POSTGRES_PASSWORD=${POSTGRES_PASSWORD}" \
              "SESSION_SECRET=${SESSION_SECRET}" \
              "ADMIN_EMAIL=${ADMIN_EMAIL}" \
              "ADMIN_PASSWORD=${ADMIN_PASSWORD}" \
              "HOST_EMAIL=${HOST_EMAIL}" \
              "HOST_PASSWORD=${HOST_PASSWORD}" \
              > ~/side-event/.env
            chmod 600 ~/side-event/.env

            echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
            docker pull ${{ env.IMAGE_NAME }}:latest
            cd ~/side-event
            docker compose up -d
            docker image prune -f
