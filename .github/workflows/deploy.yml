name: CI/CD — Side Event

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/side-event

jobs:
  # ── CI : lint + build de vérification ──────────────────────────
  build:
    name: Lint & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          # Valeur factice pour le build — la vraie URL est fournie à l'exécution
          DATABASE_URL: "file:./dev.db"
          SESSION_SECRET: "ci-build-only"

  # ── CD : image Docker poussée sur Docker Hub ───────────────────
  docker:
    name: Build & push Docker image
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Déploiement : pull + redémarrage sur le serveur via SSH ────
  deploy:
    name: Deploy to server
    needs: docker
    runs-on: ubuntu-latest
    env:
      DEPLOY_DIR: ~/side-event
    steps:
      - uses: actions/checkout@v4

      - name: Prepare compose file for server
        run: cp docker-compose.prod.yml docker-compose.yml

      - name: Copy docker-compose to server
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.IP_SERVER }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.PRIVATE_KEY }}
          passphrase: ${{ secrets.PASSPHRASE_PRIVATE_KEY }}
          port: ${{ secrets.PORT }}
          source: docker-compose.yml
          target: ${{ env.DEPLOY_DIR }}

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          HOST_EMAIL: ${{ secrets.HOST_EMAIL }}
          HOST_PASSWORD: ${{ secrets.HOST_PASSWORD }}
        with:
          host: ${{ secrets.IP_SERVER }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.PRIVATE_KEY }}
          passphrase: ${{ secrets.PASSPHRASE_PRIVATE_KEY }}
          port: ${{ secrets.PORT }}
          envs: DOCKERHUB_USERNAME,DOCKERHUB_TOKEN,POSTGRES_PASSWORD,SESSION_SECRET,ADMIN_EMAIL,ADMIN_PASSWORD,HOST_EMAIL,HOST_PASSWORD
          script: |
            set -e
            mkdir -p ~/side-event

            for var in DOCKERHUB_USERNAME POSTGRES_PASSWORD SESSION_SECRET ADMIN_EMAIL ADMIN_PASSWORD HOST_EMAIL HOST_PASSWORD; do
              if [ -z "${!var}" ]; then
                echo "ERROR: GitHub secret $var is missing or empty."
                exit 1
              fi
            done

            umask 077
            cat > ~/side-event/.env <<EOF
            DOCKERHUB_USERNAME=${DOCKERHUB_USERNAME}
            POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
            SESSION_SECRET=${SESSION_SECRET}
            ADMIN_EMAIL=${ADMIN_EMAIL}
            ADMIN_PASSWORD=${ADMIN_PASSWORD}
            HOST_EMAIL=${HOST_EMAIL}
            HOST_PASSWORD=${HOST_PASSWORD}
            EOF
            chmod 600 ~/side-event/.env

            echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
            docker pull ${{ env.IMAGE_NAME }}:latest
            cd ~/side-event
            docker compose up -d
            docker image prune -f
