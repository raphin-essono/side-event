name: CI/CD — Side Event

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/side-event

jobs:
  # ── CI : lint + build de vérification ──────────────────────────
  build:
    name: Lint & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: monolyth-side
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: monolyth-side/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          # Valeur factice pour le build — la vraie URL est fournie à l'exécution
          DATABASE_URL: "file:./dev.db"
          SESSION_SECRET: "ci-build-only"

  # ── CD : image Docker poussée sur Docker Hub ───────────────────
  docker:
    name: Build & push Docker image
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: monolyth-side
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Déploiement : pull + redémarrage sur le serveur via SSH ────
  deploy:
    name: Deploy to server
    needs: docker
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script: |
            set -e
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/side-event:latest
            docker compose -f /srv/side-event/docker-compose.yml up -d
            docker image prune -f
