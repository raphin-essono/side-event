services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: sing
      POSTGRES_PASSWORD: sing_dev
      POSTGRES_DB: vivatech
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sing -d vivatech"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "postgresql://sing:sing_dev@db:5432/vivatech?schema=public"
      SESSION_SECRET: "change-me-in-production"
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data:
